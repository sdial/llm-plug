<!-- 统计 Tab -->
  <div id="statsTab">
  <div class="flex items-center gap-2 sm:gap-3 mb-5 flex-wrap">
    <h2 class="text-xs font-semibold text-ink-600 uppercase tracking-wider">统计范围</h2>
    <select id="statsDays" onchange="loadStats()" class="text-xs border border-surface-200 rounded-lg px-2 py-1.5 outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 bg-white">
      <option value="today" selected>今天</option>
      <option value="this_week">本周</option>
      <option value="this_month">本月</option>
      <option value="7">最近7天</option>
      <option value="30">最近30天</option>
      <option value="90">最近90天</option>
      <option value="365">最近1年</option>
      <option value="0">全部</option>
    </select>
    <div class="hidden sm:block flex-1"></div>
    <span id="statsCutoffTime" class="text-xs text-ink-400 hidden">数据截止: <span id="cutoffTimeValue">-</span></span>
    <button id="refreshStatsBtn" onclick="refreshStatsData()" class="pill pill-muted hover:bg-surface-200 transition cursor-pointer text-xs flex items-center gap-1 ml-auto sm:ml-0">
      <svg id="refreshStatsIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
      <span id="refreshStatsText">刷新数据</span>
    </button>
  </div>
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 sm:gap-4 mb-6">
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">总请求</div>
        <div id="stat_total" class="text-2xl font-bold text-ink-900 mt-1">-</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">成功率</div>
        <div id="stat_success_rate" class="text-2xl font-bold text-emerald-600 mt-1">-</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">平均延迟</div>
        <div id="stat_avg_latency" class="text-2xl font-bold text-amber-600 mt-1">-</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">输入 Token</div>
        <div id="stat_input_tokens" class="text-2xl font-bold text-cyan-600 mt-1">-</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">输出 Token</div>
        <div id="stat_output_tokens" class="text-2xl font-bold text-violet-600 mt-1">-</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-ink-600 uppercase tracking-wider font-medium">总 Token</div>
        <div id="stat_total_tokens" class="text-2xl font-bold text-ink-900 mt-1">-</div>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-4 mb-6">
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">渠道请求分布</h3>
        <div id="channel_dist" class="space-y-2">-</div>
      </div>
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">模型请求分布</h3>
        <div id="model_dist" class="space-y-2">-</div>
      </div>
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">API Key 请求分布</h3>
        <div id="apikey_dist" class="space-y-2">-</div>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-4 mb-6">
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">渠道 Token 分布</h3>
        <div id="channel_token_dist" class="space-y-2">-</div>
      </div>
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">模型 Token 分布</h3>
        <div id="model_token_dist" class="space-y-2">-</div>
      </div>
      <div class="card p-4">
        <h3 class="text-xs font-semibold text-ink-600 uppercase tracking-wider mb-3">API Key Token 分布</h3>
        <div id="apikey_token_dist" class="space-y-2">-</div>
      </div>
    </div>

    <div class="card p-4 mb-6">
      <div class="flex items-center justify-between mb-3">
        <h3 id="trendTitle" class="text-xs font-semibold text-ink-600 uppercase tracking-wider">每日趋势（最近<span id="statsDaysLabel">7</span>天）</h3>
        <div class="flex items-center gap-2">
          <span id="refreshHint" class="text-xs text-emerald-600 opacity-0 transition-opacity duration-300"></span>
          <button id="refreshDailyBtn" onclick="refreshStats()" class="pill pill-brand hover:opacity-80 transition cursor-pointer text-xs">刷新统计</button>
        </div>
      </div>
      <div id="daily_trend" class="overflow-x-auto">
        <table class="w-full text-sm responsive-card">
          <thead>
            <tr class="border-b border-surface-200">
              <th id="trendTimeHeader" class="text-left py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">日期</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">请求数</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">成功</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">失败</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">平均延迟</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">输入Token</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">缓存命中</th>
              <th class="text-right py-2 px-2 text-xs text-ink-600 font-semibold uppercase tracking-wider">输出Token</th>
            </tr>
          </thead>
          <tbody id="daily_tbody"></tbody>
        </table>
      </div>
    </div>


        </div>
