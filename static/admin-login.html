<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>管理员登录</title>
    <script src="/admin/static/js/tailwind-config.js"></script>
    <script src="/admin/static/tailwind.min.js"></script>
    <link rel="stylesheet" href="/admin/static/css/admin.css">
</head>
<body class="min-h-screen bg-surface-50 flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white border border-surface-200 rounded-2xl p-6 shadow-sm">
        <h1 class="text-xl font-bold text-ink-900">管理员登录</h1>
        <p class="text-sm text-ink-500 mt-1">仅用于后台管理，不影响 LLM API 请求鉴权。</p>

        <div id="setupHint" class="hidden mt-4 text-sm rounded-lg bg-amber-50 border border-amber-200 p-3 text-amber-900">
            首次使用请先设置管理员密码。
        </div>

        <form id="loginForm" class="mt-5 space-y-4">
            <div>
                <label id="passwordLabel" class="block text-sm font-medium text-ink-900 mb-1">管理员密码</label>
                <input id="password" type="password" class="w-full border border-surface-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 bg-white" autocomplete="current-password">
            </div>
            <button id="submitBtn" type="submit" class="btn-primary w-full px-4 py-2.5 text-sm font-medium">登录</button>
        </form>

        <p id="message" class="mt-4 text-sm text-rose-600"></p>
    </div>

    <script>
    async function loadStatus() {
        const resp = await fetch('/admin/auth/status');
        const data = await resp.json();
        const setupHint = document.getElementById('setupHint');
        const password = document.getElementById('password');
        if (!data.configured) {
            setupHint.classList.remove('hidden');
            document.getElementById('passwordLabel').textContent = '设置管理员密码';
            document.getElementById('submitBtn').textContent = '设置并登录';
            password.autocomplete = 'new-password';
        }
    }

    function extractErrorMessage(detail) {
        if (typeof detail === 'string') return detail;
        if (Array.isArray(detail)) return detail.map(e => (typeof e === 'object' && e !== null ? (e.msg || JSON.stringify(e)) : String(e))).join('; ');
        if (detail && typeof detail === 'object') return detail.message || JSON.stringify(detail);
        return '';
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = document.getElementById('message');
        message.textContent = '';
        const password = document.getElementById('password').value;
        try {
            const resp = await fetch('/admin/auth/setup-login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password}),
            });
            if (!resp.ok) {
                const body = await resp.json().catch(() => null);
                throw new Error(extractErrorMessage(body?.detail) || '登录失败');
            }
            window.location.href = '/admin/';
        } catch (err) {
            message.textContent = err.message || String(err);
        }
    });

    loadStatus();
    </script>
</body>
</html>
