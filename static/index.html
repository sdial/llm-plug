<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API 转换器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eef2ff', 100:'#e0e7ff', 200:'#c7d2fe', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 800:'#3730a3', 900:'#312e81' },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
        .card { border-left: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <!-- Header -->
    <div class="bg-slate-900 text-white">
        <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold tracking-tight">LLM API 转换器</h1>
                <p class="text-slate-400 text-xs mt-0.5">openai-chat-completions / openai-response / anthropic 三格式互转</p>
            </div>
            <div class="text-xs text-slate-500">v0.1.0</div>
        </div>
    </div>

    <!-- Tab 导航 -->
    <div class="bg-slate-900">
        <div class="max-w-6xl mx-auto px-4 flex gap-1">
            <button onclick="switchTab('channels')" id="tab_channels" class="px-4 py-2.5 text-sm font-medium rounded-t-lg bg-slate-100 text-brand-700">渠道管理</button>
            <button onclick="switchTab('apikeys')" id="tab_apikeys" class="px-4 py-2.5 text-sm font-medium rounded-t-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800">API Key</button>
            <button onclick="switchTab('stats')" id="tab_stats" class="px-4 py-2.5 text-sm font-medium rounded-t-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800">统计</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <!-- 渠道管理 Tab -->
        <div id="channelsTab">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wide">渠道列表</h2>
                <button onclick="openModal()" class="bg-brand-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-brand-700 transition font-medium">+ 添加渠道</button>
            </div>
            <div id="channelList" class="space-y-3">
                <p class="text-slate-400 text-center py-8 text-sm">加载中...</p>
            </div>
        </div>

        <!-- API Key Tab -->
        <div id="apikeysTab" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wide">API Key 列表</h2>
                <button onclick="openKeyModal()" class="bg-brand-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-brand-700 transition font-medium">+ 创建 Key</button>
            </div>
            <div id="apiKeyList" class="space-y-3">
                <p class="text-slate-400 text-center py-8 text-sm">加载中...</p>
            </div>
        </div>

        <!-- 统计 Tab -->
        <div id="statsTab" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                <div class="bg-white rounded-lg border border-slate-200 p-4 border-t-[3px] border-t-brand-500">
                    <div class="text-xs text-slate-500 uppercase tracking-wide">总请求</div>
                    <div id="stat_total" class="text-2xl font-bold text-slate-800 mt-1">-</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 p-4 border-t-[3px] border-t-emerald-500">
                    <div class="text-xs text-slate-500 uppercase tracking-wide">成功率</div>
                    <div id="stat_success_rate" class="text-2xl font-bold text-emerald-600 mt-1">-</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 p-4 border-t-[3px] border-t-cyan-500">
                    <div class="text-xs text-slate-500 uppercase tracking-wide">输入 Token</div>
                    <div id="stat_input_tokens" class="text-2xl font-bold text-cyan-600 mt-1">-</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 p-4 border-t-[3px] border-t-violet-500">
                    <div class="text-xs text-slate-500 uppercase tracking-wide">输出 Token</div>
                    <div id="stat_output_tokens" class="text-2xl font-bold text-violet-600 mt-1">-</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 p-4 border-t-[3px] border-t-slate-500">
                    <div class="text-xs text-slate-500 uppercase tracking-wide">总 Token</div>
                    <div id="stat_total_tokens" class="text-2xl font-bold text-slate-800 mt-1">-</div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-lg border border-slate-200 p-4">
                    <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3">渠道分布</h3>
                    <div id="channel_dist" class="space-y-2">-</div>
                </div>
                <div class="bg-white rounded-lg border border-slate-200 p-4">
                    <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3">模型分布</h3>
                    <div id="model_dist" class="space-y-2">-</div>
                </div>
            </div>

            <div class="bg-white rounded-lg border border-slate-200 p-4 mb-6">
                <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3">每日趋势（最近7天）</h3>
                <div id="daily_trend" class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-200">
                                <th class="text-left py-2 px-2 text-slate-500 font-medium text-xs uppercase">日期</th>
                                <th class="text-right py-2 px-2 text-slate-500 font-medium text-xs uppercase">请求数</th>
                                <th class="text-right py-2 px-2 text-slate-500 font-medium text-xs uppercase">成功</th>
                                <th class="text-right py-2 px-2 text-slate-500 font-medium text-xs uppercase">失败</th>
                                <th class="text-right py-2 px-2 text-slate-500 font-medium text-xs uppercase">输入Token</th>
                                <th class="text-right py-2 px-2 text-slate-500 font-medium text-xs uppercase">输出Token</th>
                            </tr>
                        </thead>
                        <tbody id="daily_tbody">-</tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-lg border border-slate-200 p-4">
                <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3">数据清理</h3>
                <div class="flex items-center gap-3">
                    <select id="cleanup_days" class="text-sm border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <option value="7">保留最近 7 天</option>
                        <option value="30" selected>保留最近 30 天</option>
                        <option value="90">保留最近 90 天</option>
                    </select>
                    <button onclick="cleanupStats()" class="text-sm bg-rose-600 text-white px-4 py-2 rounded-lg hover:bg-rose-700 transition font-medium">清理数据</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑渠道模态框 -->
    <div id="channelModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modalTitle" class="text-base font-bold text-slate-900">添加渠道</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
                </div>
                <form id="channelForm" onsubmit="saveChannel(event)" class="space-y-4">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">名称</label>
                        <input type="text" id="f_name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">API类型</label>
                        <select id="f_api_type" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                            <option value="openai-chat-completions">OpenAI Chat Completions</option>
                            <option value="openai-response">OpenAI Response</option>
                            <option value="anthropic">Anthropic</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Base URL</label>
                        <input type="text" id="f_base_url" required placeholder="https://api.openai.com" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">API Key</label>
                        <input type="password" id="f_api_key" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">模型列表 <span class="text-slate-400 font-normal">(逗号分隔)</span></label>
                        <input type="text" id="f_models" placeholder="gpt-4o, gpt-4o-mini" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">权重</label>
                            <input type="number" id="f_weight" value="1" min="1" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">优先级</label>
                            <input type="number" id="f_priority" value="1" min="1" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">SOCKS5代理 <span class="text-slate-400 font-normal">(可选)</span></label>
                        <input type="text" id="f_socks5_proxy" placeholder="socks5://user:pass@127.0.0.1:1080" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="f_enabled" checked class="rounded border-slate-300 text-brand-600 focus:ring-brand-500">
                        <label for="f_enabled" class="text-sm text-slate-700">启用</label>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 text-slate-700">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 添加/编辑 API Key 模态框 -->
    <div id="keyModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="keyModalTitle" class="text-base font-bold text-slate-900">创建 API Key</h3>
                    <button onclick="closeKeyModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
                </div>
                <form id="keyForm" onsubmit="saveApiKey(event)" class="space-y-4">
                    <input type="hidden" id="keyEditId">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">名称</label>
                        <input type="text" id="fk_name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">API Key <span class="text-slate-400 font-normal">(留空则自动生成)</span></label>
                        <input type="text" id="fk_key" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 font-mono" placeholder="留空自动生成，或手动输入自定义 Key">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">备注</label>
                        <input type="text" id="fk_notes" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" placeholder="可选">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">允许模型 <span class="text-slate-400 font-normal">(逗号分隔，留空表示允许全部模型)</span></label>
                        <input type="text" id="fk_models" placeholder="gpt-4o, gpt-4o-mini" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onclick="closeKeyModal()" class="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 text-slate-700">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 复制 Key 提示模态框 -->
    <div id="copyKeyModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-bold text-slate-900">API Key 已创建</h3>
                    <button onclick="closeCopyKeyModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
                </div>
                <p class="text-sm text-slate-500 mb-3">请复制并妥善保存，该 Key 不会再次显示完整内容。</p>
                <div class="bg-slate-900 rounded-lg p-3 mb-4">
                    <code id="copyKeyText" class="text-sm text-emerald-400 break-all font-mono"></code>
                </div>
                <div class="flex justify-end">
                    <button onclick="doCopyKey()" class="px-4 py-2 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">复制到剪贴板</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/admin/channels';
        const API_KEYS = '/admin/api-keys';
        let channels = [];
        let apiKeys = [];
        let currentTab = 'channels';
        let pendingCopyKey = '';

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // Tab 切换
        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['channels', 'apikeys', 'stats'];
            const panelMap = { channels: 'channelsTab', apikeys: 'apikeysTab', stats: 'statsTab' };
            tabs.forEach(t => {
                const panel = document.getElementById(panelMap[t]);
                const btn = document.getElementById('tab_' + t);
                if (t === tab) {
                    panel.classList.remove('hidden');
                    btn.className = 'px-4 py-2.5 text-sm font-medium rounded-t-lg bg-slate-100 text-brand-700';
                } else {
                    panel.classList.add('hidden');
                    btn.className = 'px-4 py-2.5 text-sm font-medium rounded-t-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800';
                }
            });
            if (tab === 'stats') loadStats();
            if (tab === 'apikeys') loadApiKeys();
        }

        // ========== 渠道管理 ==========
        async function loadChannels() {
            const resp = await fetch(API);
            channels = await resp.json();
            renderChannels();
        }

        function renderChannels() {
            const container = document.getElementById('channelList');
            if (!channels.length) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">暂无渠道，点击上方按钮添加</p>';
                return;
            }
            container.innerHTML = channels.map(ch => `
                <div class="bg-white rounded-lg border border-slate-200 border-l-[3px] ${ch.enabled ? 'border-l-brand-500' : 'border-l-slate-300'} p-4 flex items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-semibold text-sm text-slate-800">${esc(ch.name)}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${ch.enabled ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${ch.enabled ? '启用' : '禁用'}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-brand-100 text-brand-700">${esc(ch.api_type)}</span>
                        </div>
                        <div class="text-sm text-slate-500 truncate">${esc(ch.base_url)}</div>
                        <div class="flex flex-wrap gap-1 mt-1.5">
                            ${ch.models.map(m => `<span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">${esc(m)}</span>`).join('')}
                        </div>
                        <div class="flex gap-3 mt-1.5 text-xs text-slate-400">
                            <span>权重: ${ch.weight}</span>
                            <span>优先级: ${ch.priority}</span>
                            ${ch.socks5_proxy ? `<span>代理: ${esc(ch.socks5_proxy)}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <select id="model_${ch.id}" class="text-sm border border-slate-300 rounded-lg px-2 py-1.5 text-slate-700 outline-none focus:ring-2 focus:ring-brand-500">
                            ${ch.models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('')}
                        </select>
                        <button onclick="testChannel('${ch.id}', this)" class="px-3 py-1.5 text-sm rounded-lg bg-violet-100 text-violet-700 hover:bg-violet-200 font-medium transition">测试</button>
                        <button onclick="toggleChannel('${ch.id}')" class="px-3 py-1.5 text-sm rounded-lg ${ch.enabled ? 'bg-amber-100 text-amber-700 hover:bg-amber-200' : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200'} font-medium transition">${ch.enabled ? '禁用' : '启用'}</button>
                        <button onclick="editChannel('${ch.id}')" class="px-3 py-1.5 text-sm rounded-lg bg-brand-100 text-brand-700 hover:bg-brand-200 font-medium transition">编辑</button>
                        <button onclick="deleteChannel('${ch.id}')" class="px-3 py-1.5 text-sm rounded-lg bg-rose-100 text-rose-700 hover:bg-rose-200 font-medium transition">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(channel = null) {
            document.getElementById('modalTitle').textContent = channel ? '编辑渠道' : '添加渠道';
            document.getElementById('editId').value = channel ? channel.id : '';
            document.getElementById('f_name').value = channel ? channel.name : '';
            document.getElementById('f_api_type').value = channel ? channel.api_type : 'openai-chat-completions';
            document.getElementById('f_base_url').value = channel ? channel.base_url : '';
            document.getElementById('f_api_key').value = channel ? channel.api_key : '';
            document.getElementById('f_models').value = channel ? channel.models.join(', ') : '';
            document.getElementById('f_weight').value = channel ? channel.weight : 1;
            document.getElementById('f_priority').value = channel ? channel.priority : 1;
            document.getElementById('f_socks5_proxy').value = channel ? (channel.socks5_proxy || '') : '';
            document.getElementById('f_enabled').checked = channel ? channel.enabled : true;
            document.getElementById('channelModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('channelModal').classList.add('hidden');
        }

        function editChannel(id) {
            const ch = channels.find(c => c.id === id);
            if (ch) openModal(ch);
        }

        async function saveChannel(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const modelsStr = document.getElementById('f_models').value;
            const data = {
                name: document.getElementById('f_name').value,
                api_type: document.getElementById('f_api_type').value,
                base_url: document.getElementById('f_base_url').value,
                api_key: document.getElementById('f_api_key').value,
                models: modelsStr ? modelsStr.split(',').map(s => s.trim()).filter(Boolean) : [],
                weight: parseInt(document.getElementById('f_weight').value) || 1,
                priority: parseInt(document.getElementById('f_priority').value) || 1,
                socks5_proxy: document.getElementById('f_socks5_proxy').value || null,
                enabled: document.getElementById('f_enabled').checked,
            };

            if (id) {
                await fetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            } else {
                await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            }
            closeModal();
            loadChannels();
        }

        async function toggleChannel(id) {
            await fetch(`${API}/${id}/toggle`, { method: 'PATCH' });
            loadChannels();
        }

        async function deleteChannel(id) {
            if (!confirm('确定删除该渠道？')) return;
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            loadChannels();
        }

        async function testChannel(id, btn) {
            const modelSelect = document.getElementById(`model_${id}`);
            const model = modelSelect ? modelSelect.value : null;
            const origText = btn.textContent;
            btn.textContent = '测试中...';
            btn.disabled = true;
            try {
                const url = model ? `${API}/${id}/test?model=${encodeURIComponent(model)}` : `${API}/${id}/test`;
                const resp = await fetch(url, { method: 'POST' });
                const result = await resp.json();
                if (result.success) {
                    alert(`✅ 测试通过\n模型: ${result.model}\n延迟: ${result.latency_ms}ms\n回复: ${result.reply}`);
                } else {
                    alert(`❌ 测试失败\n${result.message}${result.latency_ms ? '\n延迟: ' + result.latency_ms + 'ms' : ''}`);
                }
            } catch (e) {
                alert(`❌ 请求异常: ${e.message}`);
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        }

        // ========== API Key 管理 ==========
        async function loadApiKeys() {
            try {
                const resp = await fetch(API_KEYS);
                apiKeys = await resp.json();
            } catch (e) {
                apiKeys = [];
            }
            renderApiKeys();
        }

        function renderApiKeys() {
            const container = document.getElementById('apiKeyList');
            if (!apiKeys.length) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">暂无 API Key，点击上方按钮创建</p>';
                return;
            }
            container.innerHTML = `
                <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-200 bg-slate-50">
                                <th class="text-left py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">名称</th>
                                <th class="text-left py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">Key</th>
                                <th class="text-left py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">允许模型</th>
                                <th class="text-right py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">请求数</th>
                                <th class="text-right py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">Token用量</th>
                                <th class="text-right py-2.5 px-4 text-xs text-slate-500 font-semibold uppercase tracking-wide">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${apiKeys.map(k => `
                                <tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition">
                                    <td class="py-3 px-4">
                                        <div class="font-semibold text-slate-800">${esc(k.name)}</div>
                                        ${k.notes ? `<div class="text-xs text-slate-400 mt-0.5">${esc(k.notes)}</div>` : ''}
                                    </td>
                                    <td class="py-3 px-4">
                                        <code class="text-xs text-emerald-700 bg-emerald-50 px-2 py-1 rounded font-mono border border-emerald-200">${esc(k.key)}</code>
                                    </td>
                                    <td class="py-3 px-4">
                                        ${k.allowed_models && k.allowed_models.length > 0
                                            ? k.allowed_models.map(m => `<span class="text-xs bg-brand-100 text-brand-700 px-1.5 py-0.5 rounded font-medium mr-1">${esc(m)}</span>`).join('')
                                            : '<span class="text-xs text-slate-400">全部模型</span>'}
                                    </td>
                                    <td class="py-3 px-4 text-right text-slate-700 font-medium">${(k.request_count || 0).toLocaleString()}</td>
                                    <td class="py-3 px-4 text-right text-slate-700 font-medium">${formatTokens((k.total_input_tokens || 0) + (k.total_output_tokens || 0))}</td>
                                    <td class="py-3 px-4 text-right">
                                        <div class="flex items-center justify-end gap-1.5">
                                            <button onclick="copyApiKey('${esc(k.id)}')" class="px-2.5 py-1 text-xs rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium transition">复制</button>
                                            <button onclick="editApiKey('${esc(k.id)}')" class="px-2.5 py-1 text-xs rounded-md bg-brand-100 text-brand-700 hover:bg-brand-200 font-medium transition">编辑</button>
                                            <button onclick="deleteApiKey('${esc(k.id)}')" class="px-2.5 py-1 text-xs rounded-md bg-rose-100 text-rose-700 hover:bg-rose-200 font-medium transition">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function openKeyModal(key = null) {
            document.getElementById('keyModalTitle').textContent = key ? '编辑 API Key' : '创建 API Key';
            document.getElementById('keyEditId').value = key ? key.id : '';
            document.getElementById('fk_name').value = key ? key.name : '';
            document.getElementById('fk_notes').value = key ? (key.notes || '') : '';
            document.getElementById('fk_models').value = key && key.allowed_models ? key.allowed_models.join(', ') : '';
            document.getElementById('fk_key').value = '';
            document.getElementById('fk_key').disabled = !!key;
            document.getElementById('fk_key').placeholder = key ? '编辑时不可修改 Key' : '留空自动生成，或手动输入自定义 Key';
            document.getElementById('keyModal').classList.remove('hidden');
        }

        function closeKeyModal() {
            document.getElementById('keyModal').classList.add('hidden');
        }

        function editApiKey(id) {
            const k = apiKeys.find(k => k.id === id);
            if (k) openKeyModal(k);
        }

        async function saveApiKey(e) {
            e.preventDefault();
            const id = document.getElementById('keyEditId').value;
            const modelsStr = document.getElementById('fk_models').value;
            const manualKey = document.getElementById('fk_key').value.trim();
            const data = {
                name: document.getElementById('fk_name').value,
                notes: document.getElementById('fk_notes').value || '',
                allowed_models: modelsStr ? modelsStr.split(',').map(s => s.trim()).filter(Boolean) : [],
            };
            if (manualKey && !id) {
                data.key = manualKey;
            }

            if (id) {
                await fetch(`${API_KEYS}/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                closeKeyModal();
                loadApiKeys();
            } else {
                const resp = await fetch(API_KEYS, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                const result = await resp.json();
                closeKeyModal();
                if (result.key) {
                    pendingCopyKey = result.key;
                    document.getElementById('copyKeyText').textContent = result.key;
                    document.getElementById('copyKeyModal').classList.remove('hidden');
                }
                loadApiKeys();
            }
        }

        async function deleteApiKey(id) {
            if (!confirm('确定删除该 API Key？')) return;
            await fetch(`${API_KEYS}/${id}`, { method: 'DELETE' });
            loadApiKeys();
        }

        async function copyApiKey(id) {
            try {
                const resp = await fetch(`${API_KEYS}/${id}/regenerate`, { method: 'PATCH' });
                const result = await resp.json();
                if (result.key) {
                    pendingCopyKey = result.key;
                    document.getElementById('copyKeyText').textContent = result.key;
                    document.getElementById('copyKeyModal').classList.remove('hidden');
                    loadApiKeys();
                }
            } catch (e) {
                alert('复制失败: ' + e.message);
            }
        }

        function closeCopyKeyModal() {
            document.getElementById('copyKeyModal').classList.add('hidden');
            pendingCopyKey = '';
        }

        async function doCopyKey() {
            if (!pendingCopyKey) return;
            try {
                await navigator.clipboard.writeText(pendingCopyKey);
                closeCopyKeyModal();
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = pendingCopyKey;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                closeCopyKeyModal();
            }
        }

        // ========== 统计功能 ==========
        async function loadStats() {
            try {
                const resp = await fetch('/admin/stats');
                const data = await resp.json();
                renderStats(data);
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        function renderStats(data) {
            const overall = data.overall || {};
            const daily = data.daily || [];

            const total = overall.total_requests || 0;
            const successCount = overall.success_count || 0;
            const failCount = overall.fail_count || 0;
            const successRate = total > 0 ? ((successCount / total) * 100).toFixed(1) : 0;
            const inputTokens = overall.total_input_tokens || 0;
            const outputTokens = overall.total_output_tokens || 0;

            document.getElementById('stat_total').textContent = total.toLocaleString();
            document.getElementById('stat_success_rate').textContent = successRate + '%';
            document.getElementById('stat_input_tokens').textContent = formatTokens(inputTokens);
            document.getElementById('stat_output_tokens').textContent = formatTokens(outputTokens);
            document.getElementById('stat_total_tokens').textContent = formatTokens(inputTokens + outputTokens);

            // 渠道分布
            const channelDist = document.getElementById('channel_dist');
            const chs = overall.channels || [];
            if (chs.length === 0) {
                channelDist.innerHTML = '<p class="text-slate-400 text-sm">暂无数据</p>';
            } else {
                const maxCount = Math.max(...chs.map(c => c.count));
                channelDist.innerHTML = chs.map(ch => {
                    const pct = maxCount > 0 ? (ch.count / maxCount * 100) : 0;
                    return `
                        <div class="flex items-center gap-2">
                            <div class="w-24 text-sm text-slate-600 truncate">${esc(ch.name)}</div>
                            <div class="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden">
                                <div class="bg-brand-500 h-full rounded-full" style="width: ${pct}%"></div>
                            </div>
                            <div class="w-16 text-right text-sm text-slate-600 font-medium">${ch.count}</div>
                        </div>
                    `;
                }).join('');
            }

            // 模型分布
            const modelDist = document.getElementById('model_dist');
            const models = overall.models || [];
            if (models.length === 0) {
                modelDist.innerHTML = '<p class="text-slate-400 text-sm">暂无数据</p>';
            } else {
                const maxCount = Math.max(...models.map(m => m.count));
                modelDist.innerHTML = models.slice(0, 10).map(m => {
                    const pct = maxCount > 0 ? (m.count / maxCount * 100) : 0;
                    return `
                        <div class="flex items-center gap-2">
                            <div class="w-24 text-sm text-slate-600 truncate">${esc(m.name)}</div>
                            <div class="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden">
                                <div class="bg-violet-500 h-full rounded-full" style="width: ${pct}%"></div>
                            </div>
                            <div class="w-16 text-right text-sm text-slate-600 font-medium">${m.count}</div>
                        </div>
                    `;
                }).join('');
            }

            // 每日趋势
            const dailyTbody = document.getElementById('daily_tbody');
            if (daily.length === 0) {
                dailyTbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-slate-400 text-sm">暂无数据</td></tr>';
            } else {
                dailyTbody.innerHTML = daily.map(d => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50">
                        <td class="py-2 px-2 text-sm text-slate-700">${d.date}</td>
                        <td class="py-2 px-2 text-right text-sm text-slate-700 font-medium">${d.total_requests}</td>
                        <td class="py-2 px-2 text-right text-sm text-emerald-600 font-medium">${d.success_count}</td>
                        <td class="py-2 px-2 text-right text-sm text-rose-600 font-medium">${d.fail_count}</td>
                        <td class="py-2 px-2 text-right text-sm text-slate-700">${formatTokens(d.total_input_tokens)}</td>
                        <td class="py-2 px-2 text-right text-sm text-slate-700">${formatTokens(d.total_output_tokens)}</td>
                    </tr>
                `).join('');
            }
        }

        function formatTokens(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        async function cleanupStats() {
            const days = document.getElementById('cleanup_days').value;
            if (!confirm(`确定要清理 ${days} 天前的数据吗？此操作不可恢复。`)) return;
            try {
                const resp = await fetch(`/admin/stats/cleanup?keep_days=${days}`, { method: 'POST' });
                const result = await resp.json();
                alert(result.message);
                loadStats();
            } catch (e) {
                alert('清理失败: ' + e.message);
            }
        }

        // 初始化
        loadChannels();
    </script>
</body>
</html>
